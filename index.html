<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>给你的一封信</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;700&display=swap');

        body {
            /* 使用优雅的衬线字体，增加书信感 */
            font-family: 'Noto Serif SC', serif;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            overflow-x: hidden;
        }

        /* 信纸质感背景 */
        .paper-bg {
            background-color: #fff9f9;
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M11 18c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm48 25c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm-43-7c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm63 31c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM34 90c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm56-76c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM12 86c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm28-65c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm23-11c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm-6 60c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm29 22c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zM32 63c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm57-13c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm-9-21c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM60 91c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM35 41c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM12 60c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2z' fill='%23fce7e7' fill-opacity='0.4' fill-rule='evenodd'/%3E%3C/svg%3E");
            box-shadow: 0 10px 40px -10px rgba(255, 182, 193, 0.5);
        }

        /* 打字机光标闪烁动画 */
        .cursor::after {
            content: '|';
            animation: blink 1s step-end infinite;
            color: #ec4899;
        }
        @keyframes blink {
            50% { opacity: 0; }
        }

        /* 漂浮爱心动画 */
        .heart {
            position: fixed;
            font-size: 1.5rem;
            color: #ff87a0;
            opacity: 0;
            pointer-events: none;
            z-index: 0;
            animation: floatUp 8s linear infinite;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) scale(0.5) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.6;
            }
            90% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(-100px) scale(1.2) rotate(360deg);
                opacity: 0;
            }
        }

        /* 信件内容淡入 */
        .fade-in {
            animation: fadeIn 2s ease-in-out forwards;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 relative">

    <!-- 漂浮的爱心容器 -->
    <div id="hearts-container" class="fixed inset-0 overflow-hidden pointer-events-none"></div>

    <!-- 信件主体 -->
    <div class="paper-bg w-full max-w-md rounded-2xl p-8 relative z-10 fade-in border border-pink-100">
        
        <!-- 装饰性邮票/贴纸 -->
        <div class="absolute top-4 right-4 text-pink-300 transform rotate-12 opacity-50">
            <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="currentColor" stroke="none">
                <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
            </svg>
        </div>

        <!-- 标题 -->
        <h1 class="text-3xl text-pink-600 font-bold mb-8 text-center" style="font-family: 'Ma Shan Zheng', cursive; letter-spacing: 2px;">
            致 我最爱的你
        </h1>

        <!-- 正文容器 (打字机效果将在这里输出) -->
        <div class="text-gray-700 text-lg leading-loose min-h-[250px]" id="text-container">
            <span id="typed-text"></span><span class="cursor"></span>
        </div>

        <!-- 落款 (默认隐藏，打字结束后显示) -->
        <div id="signature" class="mt-10 text-right opacity-0 transition-opacity duration-1000 ease-in-out">
            <p class="text-pink-600 font-bold text-xl mb-1" style="font-family: 'Ma Shan Zheng', cursive;">永远爱你的 XXX</p>
            <p class="text-gray-400 text-sm">2026年 某月 某日</p>
        </div>
        
        <!-- 可选：添加背景音乐按钮 -->
        <div class="mt-8 text-center">
             <button id="music-btn" class="text-xs bg-pink-50 text-pink-400 px-4 py-2 rounded-full border border-pink-200 hover:bg-pink-100 transition shadow-sm">
                🎵 播放我们的歌
            </button>
            <audio id="bgm" loop>
                <!-- 这里替换为你喜欢的音乐外链，例如网易云音乐的外链 -->
                <source src="https://music.163.com/song/media/outer/url?id=1382576173.mp3" type="audio/mpeg">
            </audio>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. 打字机效果配置
        // ==========================================
        // 在这里修改你想对她说的话。每一段用逗号分隔，或者直接写很长的一段。
        // 可以使用 <br> 来换行。
        const letterText = `
            亲爱的，<br><br>
            见字如面。<br>
            二维码的容量很小，装不下我对你的思念。所以我把这份心意写在了这里，存在了云端。<br><br>
            只要互联网还存在，只要这串代码还在运行，我对你的爱就会被一直记录在这里。<br><br>
            感谢你出现在我的生命里，让平淡的日子闪闪发光。未来的路，希望能一直牵着你的手走下去。<br><br>
            每一天，都比昨天更爱你。
        `;

        const typedTextElement = document.getElementById('typed-text');
        const signatureElement = document.getElementById('signature');
        let index = 0;
        let isTag = false; // 用于处理 HTML 标签（如 <br>）

        function typeWriter() {
            if (index < letterText.length) {
                // 如果遇到 HTML 标签，一次性输出完整的标签
                if (letterText.charAt(index) === '<') {
                    isTag = true;
                }
                
                if (isTag) {
                    let tag = '';
                    while (letterText.charAt(index) !== '>' && index < letterText.length) {
                        tag += letterText.charAt(index);
                        index++;
                    }
                    tag += '>'; // 加上闭合的 '>'
                    typedTextElement.innerHTML += tag;
                    index++;
                    isTag = false;
                    setTimeout(typeWriter, 50); // 标签不需要等待，直接继续
                } else {
                    // 普通字符，逐字打印
                    typedTextElement.innerHTML += letterText.charAt(index);
                    index++;
                    setTimeout(typeWriter, 120); // 调整这里的数字改变打字速度 (毫秒)
                }
            } else {
                // 打字结束，显示落款，隐藏光标
                document.querySelector('.cursor').style.display = 'none';
                signatureElement.classList.remove('opacity-0');
                signatureElement.classList.add('opacity-100');
            }
        }

        // 页面加载完成后延迟一点点开始打字
        setTimeout(typeWriter, 1000);


        // ==========================================
        // 2. 漂浮爱心背景动画
        // ==========================================
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            
            // 随机心形符号
            const hearts = ['❤', '💖', '💕', '💗'];
            heart.innerText = hearts[Math.floor(Math.random() * hearts.length)];
            
            // 随机位置和大小
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 5 + 5 + 's'; // 5-10秒
            
            // 随机透明度和大小调整
            const scale = Math.random() * 0.5 + 0.8;
            heart.style.transform = `scale(${scale})`;
            
            document.getElementById('hearts-container').appendChild(heart);

            // 动画结束后移除元素，防止内存泄漏
            setTimeout(() => {
                heart.remove();
            }, 10000);
        }

        // 每隔一段时间生成一个爱心
        setInterval(createHeart, 800);


        // ==========================================
        // 3. 音乐播放控制
        // ==========================================
        // 由于现代浏览器限制自动播放音乐，通常需要用户点击一下才能播放
        const musicBtn = document.getElementById('music-btn');
        const bgm = document.getElementById('bgm');
        let isPlaying = false;

        musicBtn.addEventListener('click', () => {
            if (isPlaying) {
                bgm.pause();
                musicBtn.innerText = '🎵 播放我们的歌';
                musicBtn.classList.remove('animate-pulse');
            } else {
                bgm.play();
                musicBtn.innerText = '🎶 音乐播放中...';
                musicBtn.classList.add('animate-pulse');
            }
            isPlaying = !isPlaying;
        });
    </script>
</body>
</html>
